<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/popups.css">
    <link rel="stylesheet" href="./assets/style.css">
    <title>DYCIfinder</title>
</head>
<body>
    <header class="page-header">
        <h1><a class="header-title" href="index.html">DYCIfinder</a></h1>
        <button onclick="window.location.href='profile.html'">Profile</button>
        <button onclick="window.location.href='search_found.html'">Browse found items</button>
        <button onclick="window.location.href='report_found.html'">I found something</button>
        <button onclick="window.location.href='report_lost.html'">I lost something</button>
        <hr>
    </header>
    
    <main>
        <div>
            <h3>Lost Item Details</h3>
            <label>Item Name</label>
            <input type="text" id="lostpost-itemname">
            <br>
            <label>Item Category</label>
            <select id="lostpost-itemcategory"></select>
            <br>
            <label>Item Description</label>
            <textarea id="lostpost-description"></textarea>
            <br>
            <label>Lost Location</label>
            <select id="lostpost-lostlocation"></select>
            <br>
            <label>Lost Date</label>
            <input type="date" id="lostpost-lostdate">
            <br>
            <label>Photo Proof 1</label>
            <input type="file" accept="image/*" id="lostpost-image1">
            <button type="button" id="remove-image1" style="display:none;">X</button>
            <img id="preview-image1">
            <br>
            <label>Photo Proof 2</label>
            <input type="file" accept="image/*" id="lostpost-image2">
            <button type="button" id="remove-image2" style="display:none;">X</button>
            <img id="preview-image2">
            <br>
            <h3>Owner's Details</h3>
            <label>Owner Name</label>
            <input type="text" id="lostitem-ownername">
            <br>
            <label>Facebook Profile</label>
            <input type="text" id="lostowner-fbprofile">
            <br>
            <label>Contact Number</label>
            <input type="text" id="lostowner-contactno">
            <br>
            <label>Email Address</label>
            <input type="text" id="lostowner-email">
            <br><br>
            <button id="submit-lostpost-btn">Submit</button>
        </div>
    </main>
    <script type="module" src="js/report_lost.js"></script>
</body>
</html>
