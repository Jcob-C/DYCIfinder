<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/popups.css">
    <title>DYCIfinder</title>
</head>
<body>
    <header>
        <h1><a href="index.html">DYCIfinder</a></h1>
        <button onclick="window.location.href='profile.html'">Profile</button>
        <button onclick="window.location.href='search_found.html'">Browse found items</button>
        <button onclick="window.location.href='report_found.html'">I found something</button>
        <button onclick="window.location.href='report_lost.html'">I lost something</button>
        <hr>
    </header>
    
    <main>
        <div>
            <label>Finder's Name</label>
            <input type="text" id="foundpost-findername">
            <br>
            <label>Item Name</label>
            <input type="text" id="foundpost-itemname">
            <br>
            <label>Item Category</label>
            <select id="foundpost-itemcategory">
            </select>
            <br>
            <label>Item Description</label>
            <textarea id="foundpost-description"></textarea>
            <br>
            <label>Find Location</label>
            <select id="foundpost-findlocation">
            </select>
            <br>
            <label>Find Date</label>
            <input type="date" id="foundpost-finddate">
            <br>
            <label>Item Photo</label>
            <input type="file" accept="image/*" id="foundpost-image">
            <button id="remove-image" style="display: none;">X</button>
            <img id="preview-image">
            <br>
            <button id="submit-foundpost-btn">Submit</button>
        </div>
    </main>
    <script type="module" src="js/report_found.js"></script>
</body>
</html>
